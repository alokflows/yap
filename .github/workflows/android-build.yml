name: android-build

# Builds the Ripple Android app (container app + shared crypto) into a debug APK.
# This is the ONLY real verification for the Android code — it can't be compiled
# in the usual agent sandbox (no Android SDK/Gradle). Runs on pushes that touch
# the app or the shared Kotlin crypto, and on demand.

on:
  push:
    branches: ["**"]
    paths:
      - "apps/android/**"
      - "packages/core-kt/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - "packages/core-kt/**"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ripple-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
