name: desktop-release

# Builds Yap Desktop for macOS, Windows and Linux and attaches the installers to
# a GitHub Release. Trigger by pushing a tag like `v0.1.0`, or run it by hand
# from the Actions tab (workflow_dispatch) to get a draft release to test.
#
# The Rust + GUI toolchains can't run in our usual environment, so this is how
# the Windows/Linux binaries get produced — each on its own native runner.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # universal .dmg/.app (Intel + Apple Silicon)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04        # .AppImage + .deb
            args: ""
          - platform: windows-latest      # .msi + .exe
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Linux build deps: Tauri v2 webview/tray + enigo (libxdo) + native-tls (libssl).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libgtk-3-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'desktop-dev' }}
          releaseName: "Yap Desktop ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseBody: "Download the build for your OS. macOS: .dmg · Windows: .msi/.exe · Linux: .AppImage/.deb"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
