<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ripple</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="mark" src="/icon.svg" alt="Ripple" />
        <h1>Ripple</h1>
      </div>
      <span class="status" id="status" data-state="offline">
        <span class="dot"></span><span id="statusText">Not connected</span>
      </span>
    </header>

    <main>
      <!-- Pairing: Create / Join, then a locked code with QR / Invite / Change -->
      <div class="pair">
        <div class="pair-state" id="pairStart">
          <button class="primary" id="createBtn">Create code</button>
          <button id="joinBtn">Join with code</button>
        </div>
        <div class="pair-state hidden" id="pairJoin">
          <button class="icon-mini" id="joinBack" aria-label="Back">‹</button>
          <input id="code" placeholder="enter code" autocomplete="off" spellcheck="false" maxlength="12" />
          <button class="primary" id="joinGo">Join</button>
        </div>
        <div class="pair-state hidden" id="pairLocked">
          <div class="field"><span class="lbl">Pairing code</span><span class="code-display" id="codeDisplay">—</span></div>
          <button class="ghost" id="qrBtn" title="Show a QR — scan it with your phone to join">QR</button>
          <button class="ghost" id="inviteBtn" title="Copy a link that pairs another device">Invite</button>
          <button class="ghost" id="changeBtn">Change</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <button id="tabChat" class="tab" aria-selected="true">Chat</button>
        <button id="tabDevices" class="tab" aria-selected="false">Devices</button>
      </div>

      <!-- CHAT -->
      <section class="panel" id="panelChat">
        <div class="chat-controls">
          <label class="switch" title="Type each received message at your cursor in the focused app">
            <input type="checkbox" id="typeChk" checked />
            <span class="track"><span class="thumb"></span></span>
            <span>Type at cursor</span>
          </label>
          <label class="switch" title="Also copy each received message to the clipboard">
            <input type="checkbox" id="autoCopyChk" />
            <span class="track"><span class="thumb"></span></span>
            <span>Auto-copy</span>
          </label>
          <button id="undoBtn" class="ghost" title="Delete the last text we typed (within a few seconds)">Undo</button>
        </div>
        <ul id="feed" class="feed"></ul>
        <div class="composer">
          <input id="msg" placeholder="Type to send to your phone…" autocomplete="off" />
          <button id="sendBtn" class="primary" disabled>Send</button>
        </div>
      </section>

      <!-- DEVICES -->
      <section class="panel hidden" id="panelDevices">
        <div id="devices" class="devices"></div>
        <div id="devicesEmpty" class="empty">Connect with a code to see the devices on it here.</div>
      </section>
    </main>

    <!-- Per-message actions: right-click a bubble -->
    <div class="sheet-overlay" id="sheet" hidden>
      <div class="sheet">
        <div class="sheet-preview" id="sheetPreview"></div>
        <button class="sheet-btn" id="sheetCopy">Copy</button>
        <button class="sheet-btn" id="sheetResend">Resend</button>
        <button class="sheet-btn cancel" id="sheetCancel">Cancel</button>
      </div>
    </div>

    <!-- QR: phone scans it and opens the Ripple web app already connected -->
    <div class="modal-overlay" id="qrModal" hidden>
      <div class="modal-card">
        <button class="modal-close" id="qrClose" aria-label="Close">×</button>
        <div class="qr-title">Scan to connect</div>
        <div class="qr-sub">Point your phone's camera at this code — it opens Ripple <b>already connected</b>, no typing.</div>
        <div class="qr-holder"><img id="qrImg" alt="QR code to join" /></div>
        <div class="qr-code" id="qrCodeLabel">—</div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- QR generator (local, MIT) — sets the global `qrcode`, like the web app -->
    <script src="/qrcode.js"></script>
  </body>
</html>
