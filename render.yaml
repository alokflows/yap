# One-click deploy to Render (free tier, native WebSocket support).
# Deploy: https://render.com/deploy?repo=https://github.com/alokflows/ripple
services:
  - type: web
    name: yap
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
